name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DEPLOY_HOST: 18.222.205.234
  DEPLOY_USER: ubuntu
  DEPLOY_DIR: /opt/hotelshift-pro

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "NODE_ENV=production" > .env
          echo "POSTGRES_DB=neondb" >> .env
          echo "POSTGRES_USER=neondb_owner" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_NAME=neondb" >> .env
          echo "DB_USER=neondb_owner" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DATABASE_URL=postgresql://neondb_owner:${{ secrets.DB_PASSWORD }}@${{ secrets.DB_HOST }}/neondb?sslmode=require" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "JWT_EXPIRATION=12h" >> .env
          echo "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" >> .env
          echo "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}" >> .env
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env
          echo "DOMAIN=${{ secrets.DOMAIN }}" >> .env

      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }} # If your key has a passphrase
          source: "."
          target: ${{ env.DEPLOY_DIR }}
          rm: true

      - name: Execute remote commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }} # If your key has a passphrase
          script: |
            cd ${{ env.DEPLOY_DIR }}
            docker-compose down
            docker-compose up -d --build