name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DEPLOY_HOST: 18.222.205.234
  DEPLOY_USER: ubuntu
  DEPLOY_DIR: /opt/hotelshift-pro

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: Deploy env
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat <<EOF > .env
          NODE_ENV=production
          POSTGRES_DB=neondb
          POSTGRES_USER=neondb_owner
          POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=5432
          DB_NAME=neondb
          DB_USER=neondb_owner
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DATABASE_URL="postgresql://neondb_owner:${{ secrets.DB_PASSWORD }}@${{ secrets.DB_HOST }}/neondb?sslmode=require"
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRATION=12h
          ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}
          ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}
          NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
          DOMAIN=${{ secrets.DOMAIN }}
          EOF

      - name: Prepare remote directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 10m
          command_timeout: 10m
          script: |
            mkdir -p ~/hotelshift-pro
            sudo chown -R ${{ env.DEPLOY_USER }}:${{ env.DEPLOY_USER }} ~/hotelshift-pro

      - name: Deploy to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "~/hotelshift-pro"
          rm: false
          timeout: 20m

      - name: Execute remote commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 40m
          command_timeout: 40m
          script: |
            echo "--- Pre-Deployment System Check ---"
            df -h /
            free -m
            
            echo "--- Resource Cleanup ---"
            # Cleanup Docker: prune dangling images, stopped containers, and unused volumes
            docker system prune -af --volumes
            # Cleanup System: apt package cache and temp files
            sudo apt-get clean
            sudo rm -rf /tmp/*
            
            echo "--- Deploying Application ---"
            sudo mkdir -p ${{ env.DEPLOY_DIR }}
            sudo cp -r ~/hotelshift-pro/* ${{ env.DEPLOY_DIR }}/
            sudo chown -R ${{ env.DEPLOY_USER }}:${{ env.DEPLOY_USER }} ${{ env.DEPLOY_DIR }}
            
            cd ${{ env.DEPLOY_DIR }}
            docker-compose down || true
            docker buildx prune -f
            docker-compose up -d --build --remove-orphans
            
            echo "--- Post-Deployment Verification ---"
            df -h /
            docker ps